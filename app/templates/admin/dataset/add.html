{% extends 'base.html' %}

{% block title %}Tambah Dataset{% endblock %}

{% block content %}
<div class="topbar">
    <h1><i class="fas fa-plus-circle"></i> Tambah Data Dataset</h1>
</div>

<!-- Add Dataset Form -->
<div class="card">
    <div class="card-header">
        <i class="fas fa-pencil-alt"></i> Form Data Baru
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('main.dataset_add') }}">
            <div style="margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="app_target">Aplikasi Tujuan</label>
                    <select id="app_target" name="app_target" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="ChatGPT">ChatGPT</option>
                        <option value="Gemini">Gemini AI</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="text">Teks Ulasan</label>
                <textarea id="text" name="text" required="" placeholder="Masukkan teks..." maxlength="5000"></textarea>
                <small style="color: var(--text-muted);">Maksimal 5000 karakter | <span id="char-count">0</span>/5000</small>
            </div>
            
            <div class="form-group">
                <label for="label">Label Sentimen</label>
                <select id="label" name="label" required="">
                    <option value="">-- Pilih Label --</option>
                    <option value="positive">😊 Positif</option>
                    <option value="negative">😞 Negatif</option>
                    <option value="neutral">😐 Netral</option>
                </select>
            </div>
            
            <div class="flex-gap-10">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Simpan
                </button>
                <a href="{{ url_for('main.dataset_list') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Batal
                </a>
            </div>
        </form>
    </div>
</div>

<script>
// Character counter
document.getElementById('text').addEventListener('input', function() {
    document.getElementById('char-count').textContent = this.value.length;
});
</script>
{% endblock %}
